<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izaias Brasileiro - Desenvolvedor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #e0e0e0; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; flex: 1; }
  header { text-align: center; padding: 60px 0 40px; }
  .avatar { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #00d4ff, #7b2ff7); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 48px; color: #fff; }
  h1 { font-size: 2.2em; color: #fff; margin-bottom: 8px; }
  .subtitle { color: #8892b0; font-size: 1.1em; }
  .links { margin: 20px 0; }
  .links a { display: inline-block; margin: 0 10px; color: #00d4ff; text-decoration: none; font-size: 0.95em; }
  .links a:hover { text-decoration: underline; }
  section { margin: 50px 0; }
  h2 { font-size: 1.5em; color: #00d4ff; margin-bottom: 20px; border-bottom: 2px solid #1a1a3e; padding-bottom: 10px; }
  .app { background: #1a1a3e; border-radius: 12px; padding: 24px; margin-bottom: 20px; transition: transform 0.2s; }
  .app:hover { transform: translateY(-2px); }
  .app h3 { color: #fff; font-size: 1.2em; }
  .app p { color: #8892b0; margin: 8px 0; }
  .app .tag { display: inline-block; background: rgba(0,212,255,0.15); color: #00d4ff; padding: 3px 10px; border-radius: 20px; font-size: 0.8em; margin: 4px 4px 0 0; }
  footer { text-align: center; padding: 30px; color: #4a4a6a; font-size: 0.85em; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="avatar">IB</div>
    <h1>Izaias Brasileiro</h1>
    <p class="subtitle">Desenvolvedor Android</p>
    <div class="links">
      <a href="mailto:Job.IzaisaBrasileiro-Dev@gmail.com">Email</a>
      <a href="https://github.com/Job.IzaisaBrasileiro-Dev">GitHub</a>
    </div>
  </header>

  <section>
    <h2>Aplicativos</h2>
    <div class="app">
      <h3>RadiAll</h3>
      <p>App de rádio online com streaming ao vivo, player em segundo plano e widgets.</p>
      <span class="tag">Android</span>
      <span class="tag">Kotlin</span>
      <span class="tag">AdMob</span>
    </div>
  </section>
</div>
<footer>&copy; 2026 Izaias Brasileiro</footer>
